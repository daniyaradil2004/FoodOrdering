name: QA CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restaurant-front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: restaurant-front/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Frontend tests temporarily disabled
        run: echo "Skipping frontend lint/unit/e2e checks for now. Will be re-enabled later."

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restaurant-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: restaurant-app/go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
